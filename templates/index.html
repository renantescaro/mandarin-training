<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino de Mandarim</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">
    <header class="bg-white border-b border-slate-200 py-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Treino de Audição</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="/quiz" class="inline-flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                    </svg>
                    Ir para o Quiz
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {% for item in caracteres %}
            <div data-audio="{{ item.audio }}" class="card-character bg-white rounded-2xl border border-slate-200 p-5 flex flex-col justify-between transition-all duration-300 hover:shadow-md hover:border-slate-300 cursor-pointer group" onclick="playAudio('{{ item.audio }}', this)">
                
                <div class="flex justify-between items-start mb-4">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-slate-100 text-slate-600 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                        {{ item.pinyin }}
                    </span>
                    <div class="text-slate-400 group-hover:text-indigo-600 transition-colors" id="icon-{{ item.audio | replace('.', '_') }}">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                        </svg>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <div class="text-5xl font-bold text-slate-900 mb-2 tracking-wide select-none transition-transform group-hover:scale-105 duration-200">
                        {{ item.hanji }}
                    </div>
                    <div class="text-sm text-slate-500 font-medium px-2 line-clamp-2">
                        {{ item.traducao }}
                    </div>
                </div>

                <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden opacity-0 group-hover:opacity-100 transition-opacity">
                    <div id="progress-{{ item.audio | replace('.', '_') }}" class="bg-indigo-600 h-full w-0 transition-all duration-100 ease-linear"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        let currentAudio = null;
        let currentCard = null;
        let currentIconDiv = null;
        let currentProgressBar = null;
        let progressInterval = null;

        const defaultSpeakerIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>`;
        const playingIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-pulse text-indigo-600"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" /></svg>`;

        function resetActiveState() {
            clearInterval(progressInterval);
            if (currentCard) {
                currentCard.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-100', 'bg-indigo-50/10');
            }
            if (currentIconDiv) {
                currentIconDiv.innerHTML = defaultSpeakerIcon;
            }
            if (currentProgressBar) {
                currentProgressBar.style.width = '0%';
            }
        }

        function playAudio(filename, cardElement) {
            const sanitizedId = filename.replace('.', '_');
            const iconDiv = document.getElementById(`icon-${sanitizedId}`);
            const progressBar = document.getElementById(`progress-${sanitizedId}`);

            if (currentAudio && !currentAudio.paused && currentCard === cardElement) {
                currentAudio.pause();
                resetActiveState();
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                resetActiveState();
            }

            currentCard = cardElement;
            currentIconDiv = iconDiv;
            currentProgressBar = progressBar;

            cardElement.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-100', 'bg-indigo-50/10');
            iconDiv.innerHTML = playingIcon;

            currentAudio = new Audio('/static/audio/' + filename);
            
            currentAudio.addEventListener('playing', () => {
                progressInterval = setInterval(() => {
                    if (currentAudio.duration) {
                        const percentage = (currentAudio.currentTime / currentAudio.duration) * 100;
                        progressBar.style.width = `${percentage}%`;
                    }
                }, 50);
            });

            currentAudio.addEventListener('ended', () => {
                resetActiveState();
            });

            currentAudio.addEventListener('pause', () => {
                resetActiveState();
            });

            currentAudio.play().catch(error => {
                resetActiveState();
                console.error("Erro ao reproduzir áudio:", error);
            });
        }
    </script>
</body>
</html>
